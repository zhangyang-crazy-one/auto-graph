matrices:
  - id: traceability-matrix
    rows: [sn-1, sn-2, req-1, req-2, fn-1, fn-2]
    cols: [operational-model, safety-model, performance-model]
    position: { x: 900, y: 90 }
    cells:
      - [covered, covered, gap]
      - [covered, gap, covered]
      - [derived, covered, covered]
      - [gap, covered, covered]
      - [covered, derived, covered]
      - [covered, covered, derived]
  - id: verification-matrix
    rows: [vt-1, vt-2, vt-3, vt-4, vt-5, vt-6]
    cols: [need, requirement, function]
    position: { x: 900, y: 390 }
    cells:
      - [pass, pass, pass]
      - [pass, watch, pass]
      - [watch, pass, pass]
      - [pass, pass, watch]
      - [pass, pass, pass]
      - [watch, watch, pass]
evidencePanels:
  - id: traceability-spine-rules
    kind: rule
    position: { x: 180, y: 660 }
    items:
      - { id: rule-one-hop, label: One-hop trace, detail: Every row traces to the next model layer }
      - { id: rule-verification, label: Verification link, detail: Every requirement has at least one verification case }
      - { id: rule-no-orphan, label: No orphan, detail: No function stands without a requirement source }
